<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Barco fácil</title>
    <link rel="stylesheet" href="../cadastro/cadastro.css">
</head>
<body>
    <form>
        <fieldset>
            <legend>Dados do Usuário</legend>
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" required>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            <label for="telefone">Telefone:</label>
            <input type="tel" id="telefone" name="telefone">
            <label for="curso">Serviçoes disponíveis:</label>
            <select id="curso" name="curso">
                <option>Encomendas</option>
                <option>Passagens</option>
            </select>
            <label for="arquivo">Anexos:<input type="file" id="arquivo"/></label>
            <label for="escondido"><input type="hidden" id="escondido" value="arquivo enviado"/></label>
            <label for="mensagem">Mensagem:</label>
            <textarea id="mensagem"
                        name="mensagem"
                        rows="5">
            </textarea>
            <button type="submit">
                Enviar
            </button>
        </fieldset>
    </form>
</body>
</html>
